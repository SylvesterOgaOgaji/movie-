<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCREEN | Cinematic Movie Browser - Experience Cinema Anywhere</title>
    <meta name="description"
        content="SCREEN is a premium cinematic movie browser. Explore trending films, series, and high-quality trailers with a stunning dark-theme experience.">
    <meta name="keywords" content="movies, series, browser, cinema, trailers, entertainment, cinematic app">
    <meta name="referrer" content="no-referrer">
    <meta property="og:title" content="SCREEN | Cinematic Movie Browser">
    <meta property="og:description"
        content="The ultimate cinematic experience for browsing your favorite movies and series.">
    <meta property="og:type" content="website">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "SCREEN Cinematic Movie Browser",
      "url": "https://screen-app.example.com",
      "description": "Premium cinematic movie and series browser.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://screen-app.example.com/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Ezoic Header Script -->
    <!-- REPLACE 'YOUR_EZOIC_ID' WITH YOUR ACTUAL EZOIC PUBLISHER ID -->
    <!-- 
    <script async src="//www.ezoic.com/ezoic.js?id=YOUR_EZOIC_ID"></script>
    -->
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --accent-gold: #e8c547;
            --accent-red: #e85f47;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --card-bg: #1a1a1a;
            --header-bg: rgba(10, 10, 10, 0.95);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'DM Sans', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        h1,
        h2,
        h3,
        .heading {
            font-family: 'Bebas Neue', cursive;
            letter-spacing: 1px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-gold);
        }

        /* Header */
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            padding: 1rem 5%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(232, 197, 71, 0.1);
        }

        .logo {
            font-family: 'Bebas Neue', cursive;
            font-size: 2.5rem;
            color: var(--accent-gold);
            text-decoration: none;
            letter-spacing: 2px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        h1.logo-wrapper {
            margin: 0;
            padding: 0;
            line-height: 1;
        }

        .search-container {
            flex: 1;
            max-width: 500px;
            margin: 0 2rem;
            position: relative;
        }

        #searchInput {
            width: 100%;
            padding: 0.8rem 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            color: white;
            font-family: inherit;
            transition: var(--transition);
        }

        #searchInput:focus {
            outline: none;
            border-color: var(--accent-gold);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 25px rgba(232, 197, 71, 0.2);
            transform: scale(1.02);
        }

        /* --- Premium Filter Control Center --- */
        .filter-control-center {
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(232, 197, 71, 0.2);
            border-radius: 12px;
            padding: 2rem;
            margin: 1rem 5% 2rem;
            display: none;
            flex-direction: column;
            gap: 1.5rem;
            position: relative;
            z-index: 100;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            animation: slideDown 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .filter-control-center.active {
            display: flex;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .filter-tabs {
            display: flex;
            gap: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 0.5rem;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .filter-tab {
            font-family: 'Bebas Neue', cursive;
            font-size: 1.1rem;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0.5rem 0;
            position: relative;
            white-space: nowrap;
            letter-spacing: 1px;
            transition: var(--transition);
        }

        .filter-tab.active {
            color: var(--accent-gold);
        }

        .filter-tab.active::after {
            content: '';
            position: absolute;
            bottom: -0.6rem;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--accent-gold);
        }

        .filter-panel {
            display: none;
            flex-wrap: wrap;
            gap: 0.8rem;
            max-height: 200px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .filter-panel.active {
            display: flex;
        }

        .filter-pill {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            padding: 0.4rem 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: var(--transition);
            white-space: nowrap;
        }

        .filter-pill:hover {
            border-color: rgba(255, 255, 255, 0.3);
            color: white;
        }

        .filter-pill.active {
            background: var(--accent-gold);
            color: var(--bg-color);
            border-color: var(--accent-gold);
            box-shadow: 0 0 15px rgba(232, 197, 71, 0.2);
        }

        .active-filters-display {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin: 0 5% 2rem;
        }

        .active-filter-tag {
            background: rgba(232, 197, 71, 0.1);
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            padding: 0.3rem 0.8rem;
            border-radius: 4px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .active-filter-tag span {
            font-weight: bold;
            font-size: 1.1rem;
            line-height: 1;
        }

        .filters {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            padding: 0.6rem 1.4rem;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Bebas Neue', cursive;
            font-size: 1.1rem;
            letter-spacing: 1.5px;
            transition: var(--transition);
            text-transform: uppercase;
        }

        .filter-btn:hover {
            border-color: rgba(255, 255, 255, 0.4);
            color: white;
        }

        .filter-btn.active {
            background: var(--accent-gold);
            color: var(--bg-color);
            border-color: var(--accent-gold);
            box-shadow: 0 0 15px rgba(232, 197, 71, 0.2);
        }

        .filter-trigger {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: transparent;
            color: var(--text-muted);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            font-family: 'Bebas Neue', cursive;
            font-size: 1.1rem;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
        }

        .filter-trigger:hover {
            border-color: rgba(255, 255, 255, 0.4);
            color: white;
        }

        .filter-trigger.active {
            background: rgba(232, 197, 71, 0.1);
            color: var(--accent-gold);
            border-color: var(--accent-gold);
        }

        .filter-trigger .arrow {
            font-size: 0.7rem;
            transition: transform 0.3s ease;
        }

        .filter-trigger.active .arrow {
            transform: rotate(180deg);
        }

        .rating-slider {
            width: 100%;
            max-width: 300px;
            margin: 1rem 0;
        }

        /* Hero */
        .hero {
            height: 80vh;
            position: relative;
            display: flex;
            align-items: center;
            padding: 0 5%;
            overflow: hidden;
            background: var(--bg-color);
        }

        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.4;
            transform: scale(1.1);
            transition: transform 1s ease-out;
            z-index: 1;
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, var(--bg-color) 0%, rgba(10, 10, 10, 0.8) 40%, transparent 100%),
                linear-gradient(0deg, var(--bg-color) 0%, transparent 50%);
            z-index: 2;
        }

        .hero-content {
            position: relative;
            z-index: 3;
            max-width: 700px;
            transform: translateY(30px);
            opacity: 0;
            animation: heroUp 1s forwards cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes heroUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .hero-title {
            font-size: clamp(3rem, 8vw, 6rem);
            line-height: 0.9;
            margin-bottom: 1rem;
            color: var(--accent-gold);
        }

        .hero-meta {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--text-muted);
            font-weight: 500;
            flex-wrap: wrap;
        }

        .hero-meta span {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .hero-rating {
            color: var(--accent-gold);
            font-weight: bold;
        }

        .hero-plot {
            font-size: 1.1rem;
            margin-bottom: 2rem;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .btn-primary {
            background: var(--accent-gold);
            color: var(--bg-color);
            border: none;
            padding: 1rem 2.5rem;
            font-family: 'Bebas Neue', cursive;
            font-size: 1.4rem;
            cursor: pointer;
            transition: var(--transition);
            border-radius: 4px;
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
        }

        .btn-primary:hover {
            background: #ffffff;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(232, 197, 71, 0.3);
        }

        /* Grid */
        main {
            padding: 4rem 5%;
        }

        .section-title {
            margin-bottom: 1.5rem;
            font-size: 2.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .section-title::after {
            content: '';
            height: 2px;
            flex: 1;
            background: linear-gradient(90deg, var(--accent-gold), transparent);
            opacity: 0.3;
        }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 2.5rem 1.5rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: var(--transition);
            opacity: 0;
            transform: translateY(20px);
        }

        .card.in-view {
            animation: cardIn 0.6s forwards;
        }

        @keyframes cardIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 15px rgba(232, 197, 71, 0.2);
            border: 1px solid rgba(232, 197, 71, 0.4);
        }

        .card-img-container {
            aspect-ratio: 2/3;
            overflow: hidden;
            position: relative;
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s ease;
        }

        .card:hover .card-img {
            transform: scale(1.1);
        }

        .card-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--accent-red);
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: bold;
            z-index: 5;
        }

        .type-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.7rem;
            text-transform: uppercase;
            border: 1px solid rgba(232, 197, 71, 0.3);
        }

        .card-content {
            padding: 1rem;
        }

        .card-title {
            font-size: 1.2rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 0.3rem;
        }

        .card-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .card-rating {
            color: var(--accent-gold);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* ---------------------------------------------------------
           PREMIUM POLISH & ANIMATIONS
           --------------------------------------------------------- */

        .card {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.6s cubic-bezier(0.22, 1, 0.36, 1),
                transform 0.6s cubic-bezier(0.22, 1, 0.36, 1),
                box-shadow 0.3s ease,
                border-color 0.3s ease;
        }

        .card.in-view {
            opacity: 1;
            transform: translateY(0);
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02) !important;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(232, 197, 71, 0.2);
            border-color: rgba(232, 197, 71, 0.5);
            z-index: 10;
        }

        .card:hover .card-img {
            transform: scale(1.1);
        }

        .hero-bg {
            transition: transform 0.1s ease-out;
            /* Smooth parallax */
        }

        .btn-primary {
            position: relative;
            overflow: hidden;
            transition: background 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
        }

        .btn-primary:active {
            transform: scale(0.95);
        }

        .btn-primary:hover {
            box-shadow: 0 0 15px rgba(232, 197, 71, 0.4);
        }

        html {
            scroll-behavior: smooth;
        }

        /* Modal Slide Up */
        .modal-content {
            transform: translateY(50px);
            opacity: 0;
            transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.5s ease;
        }

        .modal.active .modal-content {
            transform: translateY(0);
            opacity: 1;
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .modal.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: #111;
            width: 100%;
            max-width: 1000px;
            max-height: 90vh;
            border-radius: 20px;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 0 50px rgba(0, 0, 0, 1);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: var(--transition);
        }

        .modal-close:hover {
            background: var(--accent-red);
        }

        .modal-hero {
            height: 400px;
            position: relative;
        }

        .modal-hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .modal-hero::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(0deg, #111 0%, transparent 100%);
        }

        .modal-body {
            padding: 2rem;
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 2.5rem;
            position: relative;
            margin-top: -100px;
        }

        .modal-poster {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .modal-details h2 {
            font-size: 3.5rem;
            line-height: 1;
            margin-bottom: 0.5rem;
            color: var(--accent-gold);
        }

        .modal-tags {
            display: flex;
            gap: 0.6rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .tag {
            background: rgba(232, 197, 71, 0.1);
            color: var(--accent-gold);
            padding: 0.2rem 0.8rem;
            border-radius: 5px;
            font-size: 0.8rem;
            border: 1px solid rgba(232, 197, 71, 0.2);
        }

        .meta-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
            background: rgba(255, 255, 255, 0.03);
            padding: 1.5rem;
            border-radius: 12px;
        }

        .meta-item label {
            display: block;
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .meta-item span {
            font-weight: bold;
            font-size: 1.1rem;
        }

        .gallery {
            margin-top: 2rem;
            overflow-x: auto;
            display: flex;
            gap: 1rem;
            padding-bottom: 1rem;
        }

        .gallery::-webkit-scrollbar {
            height: 4px;
        }

        .gallery img {
            height: 150px;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
        }

        .gallery img:hover {
            transform: scale(1.05);
        }

        .awards-badge {
            background: linear-gradient(45deg, #1a1a1a, #2a2a2a);
            padding: 1rem;
            border-left: 4px solid var(--accent-gold);
            margin-top: 2rem;
            font-style: italic;
        }

        /* Reviews Section (UGC) */
        .reviews-section {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .reviews-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .review-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .review-author {
            font-weight: bold;
            color: var(--accent-gold);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .review-rating {
            font-size: 0.8rem;
            background: rgba(232, 197, 71, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .review-text {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .add-review-btn {
            background: transparent;
            color: var(--accent-gold);
            border: 1px solid var(--accent-gold);
            padding: 0.6rem 1.2rem;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .add-review-btn:hover {
            background: var(--accent-gold);
            color: var(--bg-color);
        }

        iframe {
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Responsive */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 1rem;
                padding: 1.5rem 5%;
            }

            .search-container {
                margin: 0.5rem 0;
                width: 100%;
            }

            .modal-body {
                grid-template-columns: 1fr;
                margin-top: 0;
                padding: 1.5rem;
            }

            .modal-poster {
                max-width: 250px;
                margin: 0 auto;
            }

            .modal-details h2 {
                font-size: 2.5rem;
            }

            .hero {
                height: 60vh;
                text-align: center;
                justify-content: center;
            }

            .hero-meta {
                justify-content: center;
            }

            .hero-title {
                font-size: 3.5rem;
            }

            .hero-bg {
                opacity: 0.6;
            }
        }

        /* Ezoic Ad Placeholders */
        .ad-placeholder {
            margin: 2rem auto;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            min-height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px dashed rgba(255, 255, 255, 0.1);
            max-width: 1200px;
            overflow: hidden;
        }

        .ad-placeholder::before {
            content: 'Advertisement';
        }

        .review-form {
            background: rgba(255, 255, 255, 0.05);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            display: none;
        }

        .review-form.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .review-form input,
        .review-form textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 0.8rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            font-family: inherit;
        }

        .review-form textarea {
            height: 100px;
            resize: none;
        }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <header>
        <h1 class="logo-wrapper"><a href="#" class="logo">SCREEN</a></h1>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search movies, actors, directors or genres...">
        </div>
        <div class="filters">
            <button class="filter-btn active" data-type="all">ALL</button>
            <button class="filter-btn" data-type="movie">MOVIES</button>
            <button class="filter-btn" data-type="series">SERIES</button>
            <button id="filterTrigger" class="filter-trigger">
                FILTER <span class="arrow">▼</span>
            </button>
        </div>
    </header>

    <!-- Ezoic Top Banner Ad Placeholder -->
    <div id="ezoic-pub-ad-placeholder-101" class="ad-placeholder"></div>

    <div id="hero"></div>

    <main>
        <!-- Filter Control Center -->
        <div id="filterControlCenter" class="filter-control-center">
            <div class="filter-tabs">
                <div class="filter-tab active" data-target="genrePanel">GENRE</div>
                <div class="filter-tab" data-target="actorPanel">ACTORS</div>
                <div class="filter-tab" data-target="directorPanel">DIRECTORS</div>
                <div class="filter-tab" data-target="countryPanel">COUNTRY</div>
                <div class="filter-tab" data-target="ratingPanel">MIN RATING</div>
            </div>

            <div id="genrePanel" class="filter-panel active"></div>
            <div id="actorPanel" class="filter-panel"></div>
            <div id="directorPanel" class="filter-panel"></div>
            <div id="countryPanel" class="filter-panel"></div>
            <div id="ratingPanel" class="filter-panel">
                <div style="color: var(--text-muted); margin-bottom: 0.5rem;">Minimum IMDb Rating: <span
                        id="ratingVal">0</span>+</div>
                <input type="range" id="ratingSlider" class="rating-slider" min="0" max="10" step="0.1" value="0">
            </div>
        </div>

        <div id="activeFiltersDisplay" class="active-filters-display"></div>

        <h2 class="section-title">Trending Today</h2>

        <!-- Ezoic Mid-Grid Ad Placeholder -->
        <div id="ezoic-pub-ad-placeholder-102" class="ad-placeholder"></div>

        <div class="movie-grid" id="movieGrid"></div>
    </main>

    <!-- Ezoic Bottom Ad Placeholder -->
    <div id="ezoic-pub-ad-placeholder-103" class="ad-placeholder"></div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <button class="modal-close" aria-label="Close modal">&times;</button>
            <div id="modalData"></div>
        </div>
    </div>

    <!-- Data -->
    <script id="movieData" type="application/json">[]</script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('movieGrid');
            const hero = document.getElementById('hero');
            const searchInput = document.getElementById('searchInput');
            const filterBtns = document.querySelectorAll('.filter-btn');
            const filterTrigger = document.getElementById('filterTrigger');
            const filterControlCenter = document.getElementById('filterControlCenter');
            const activeFiltersDisplay = document.getElementById('activeFiltersDisplay');
            const ratingSlider = document.getElementById('ratingSlider');
            const ratingVal = document.getElementById('ratingVal');
            const modal = document.getElementById('modal');
            const modalData = document.getElementById('modalData');
            const modalClose = document.querySelector('.modal-close');

            let currentType = 'trending'; // trending, movie, series
            let searchQuery = '';
            let currentPage = 1;
            let isLoading = false;
            let hasMore = true;
            let allMovies = [];
            let activeGenreId = '';

            const activeFilters = {
                Genre: new Set(),
                minRating: 0
            };

            // Mapping TMDB to our format
            const mapTMDB = (m) => ({
                Title: m.title || m.name,
                Year: (m.release_date || m.first_air_date || '').split('-')[0],
                Poster: m.poster_path ? `https://image.tmdb.org/t/p/w500${m.poster_path}` : 'https://placehold.jp/24/0a0a0a/e8c547/300x450.png?text=' + encodeURIComponent(m.title || m.name),
                Backdrop: m.backdrop_path ? `https://image.tmdb.org/t/p/original${m.backdrop_path}` : '',
                Plot: m.overview,
                imdbRating: m.vote_average ? m.vote_average.toFixed(1) : 'N/A',
                imdbVotes: m.vote_count ? m.vote_count.toLocaleString() : '0',
                Type: m.media_type || (m.first_air_date ? 'series' : 'movie'),
                imdbID: m.id,
                Genre: '', // Will be filled if we fetch genres
                Trailer: '', // Requires separate fetch for videos
                Images: m.backdrop_path ? [`https://image.tmdb.org/t/p/original${m.backdrop_path}`] : []
            });

            const fetchMovies = async (reset = false) => {
                if (isLoading || (!hasMore && !reset)) return;
                isLoading = true;
                if (reset) {
                    currentPage = 1;
                    allMovies = [];
                    grid.innerHTML = '<div class="loading-spinner" style="grid-column: 1/-1; text-align: center; padding: 2rem;">Loading...</div>';
                    hasMore = true;
                }

                let fetchType = currentType;
                if (searchQuery) fetchType = 'search';
                else if (activeGenreId || activeFilters.minRating > 0) fetchType = 'discover';

                const url = `/api/movies?type=${fetchType}&query=${encodeURIComponent(searchQuery)}&page=${currentPage}&genre=${activeGenreId}&rating=${activeFilters.minRating}`;

                try {
                    const response = await fetch(url);
                    const data = await response.json();

                    if (data.results) {
                        const newMovies = data.results.map(mapTMDB);
                        allMovies = reset ? newMovies : [...allMovies, ...newMovies];
                        hasMore = data.page < data.total_pages;
                        currentPage++;
                        renderGrid(reset);
                        if (reset && allMovies.length > 0) renderHero(allMovies[0]);
                    }
                } catch (error) {
                    console.error("Fetch error:", error);
                } finally {
                    isLoading = false;
                    const spinner = grid.querySelector('.loading-spinner');
                    if (spinner) spinner.remove();
                }
            };

            const fetchGenres = async () => {
                try {
                    const response = await fetch('/api/movies?type=genres');
                    const data = await response.json();
                    if (data.genres) {
                        const panel = document.getElementById('genrePanel');
                        data.genres.forEach(g => {
                            const pill = document.createElement('div');
                            pill.className = 'filter-pill';
                            pill.textContent = g.name.toUpperCase();
                            pill.onclick = () => {
                                document.querySelectorAll('#genrePanel .filter-pill').forEach(p => p.classList.remove('active'));
                                if (activeGenreId === g.id.toString()) {
                                    activeGenreId = '';
                                } else {
                                    activeGenreId = g.id.toString();
                                    pill.classList.add('active');
                                }
                                fetchMovies(true);
                            };
                            panel.appendChild(pill);
                        });
                    }
                } catch (e) { console.error(e); }
            };

            // Rating Slider Listener
            ratingSlider.oninput = (e) => {
                const val = e.target.value;
                ratingVal.textContent = val;
                activeFilters.minRating = parseFloat(val);
            };

            ratingSlider.onchange = () => {
                fetchMovies(true);
            };

            // Tab Switching
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.onclick = () => {
                    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.filter-panel').forEach(p => p.classList.remove('active'));
                    tab.classList.add('active');
                    document.getElementById(tab.dataset.target).classList.add('active');
                };
            });

            const renderHero = (movie) => {
                if (!movie) return;
                hero.innerHTML = `
                    <div class="hero">
                        <img src="${movie.Backdrop || movie.Poster}" class="hero-bg" alt="">
                        <div class="hero-overlay"></div>
                        <div class="hero-content">
                            <div class="tag" style="margin-bottom: 1rem; display: inline-block;">Featured Title</div>
                            <h1 class="hero-title">${movie.Title}</h1>
                            <div class="hero-meta">
                                <span class="hero-rating">★ ${movie.imdbRating}</span>
                                <span>${movie.Year}</span>
                                <span style="text-transform: uppercase;">${movie.Type}</span>
                            </div>
                            <p class="hero-plot">${movie.Plot}</p>
                            <button class="btn-primary" onclick="window.openModalById(${movie.imdbID})">View Details</button>
                        </div>
                    </div>
                `;
            };

            const openModalById = async (id) => {
                // For simplicity, we use the already fetched movie object from allMovies
                const movie = allMovies.find(m => m.imdbID === id);
                if (!movie) return;

                modalData.innerHTML = `
                    <div class="modal-hero">
                        <img src="${movie.Backdrop || movie.Poster}" alt="">
                    </div>
                    <div class="modal-body">
                        <div class="modal-poster-col">
                            <img src="${movie.Poster}" class="modal-poster" alt="">
                        </div>
                        <div class="modal-details">
                            <h2 class="heading">${movie.Title}</h2>
                            <div class="modal-tags">
                                <span class="tag">${movie.Type.toUpperCase()}</span>
                                <span class="tag">${movie.Year}</span>
                            </div>
                            <p style="font-size: 1.1rem; margin-bottom: 2rem; line-height: 1.6;">${movie.Plot}</p>
                            <div class="meta-grid">
                                <div class="meta-item"><label>Rating</label><span>★ ${movie.imdbRating} (${movie.imdbVotes})</span></div>
                                <div class="meta-item"><label>Release Year</label><span>${movie.Year}</span></div>
                            </div>
                        </div>
                    </div>
                `;
                modal.classList.add('active');
                document.body.style.overflow = 'hidden';
            };
            window.openModalById = openModalById;

            const renderGrid = (reset = false) => {
                if (reset) grid.innerHTML = '';

                allMovies.forEach(m => {
                    // Check if already in grid
                    if (grid.querySelector(`[data-id="${m.imdbID}"]`)) return;

                    const card = document.createElement('div');
                    card.className = 'card';
                    card.dataset.id = m.imdbID;
                    card.onclick = () => openModalById(m.imdbID);

                    card.innerHTML = `
                        <div class="card-img-container">
                            <img class="card-img" src="${m.Poster}" alt="${m.Title}" onerror="this.src='https://placehold.jp/24/0a0a0a/e8c547/300x450.png?text=${encodeURIComponent(m.Title)}'">
                            <div class="type-badge">${m.Type.toUpperCase()}</div>
                        </div>
                        <div class="card-content">
                            <h3 class="card-title">${m.Title}</h3>
                            <div class="card-info">
                                <span>${m.Year}</span>
                                <span class="card-rating">★ ${m.imdbRating}</span>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            };

            const closeModal = () => {
                modal.classList.remove('active');
                document.body.style.overflow = '';
            };

            // Infinite Scroll
            window.onscroll = () => {
                if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
                    fetchMovies();
                }
            };

            // Listeners
            let searchTimeout;
            searchInput.addEventListener('input', (e) => {
                clearTimeout(searchTimeout);
                searchQuery = e.target.value;
                searchTimeout = setTimeout(() => fetchMovies(true), 500);
            });

            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentType = btn.dataset.type === 'all' ? 'trending' : btn.dataset.type === 'movie' ? 'movies' : 'series';
                    activeGenreId = ''; // Reset genre when switching main type
                    document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
                    fetchMovies(true);
                });
            });

            filterTrigger.onclick = () => {
                filterControlCenter.classList.toggle('active');
                filterTrigger.classList.toggle('active');
            };

            modalClose.onclick = closeModal;
            modal.onclick = (e) => { if (e.target === modal) closeModal(); };

            // Init
            fetchGenres();
            fetchMovies(true);
        });
    </script>
</body>

</html>
