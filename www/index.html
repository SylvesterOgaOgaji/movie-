<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCREEN | Cinematic Movie Browser - Experience Cinema Anywhere</title>
    <meta name="description"
        content="SCREEN is a premium cinematic movie browser. Explore trending films, series, and high-quality trailers with a stunning dark-theme experience.">
    <meta name="keywords" content="movies, series, browser, cinema, trailers, entertainment, cinematic app">
    <meta property="og:title" content="SCREEN | Cinematic Movie Browser">
    <meta property="og:description"
        content="The ultimate cinematic experience for browsing your favorite movies and series.">
    <meta property="og:type" content="website">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "SCREEN Cinematic Movie Browser",
      "url": "https://screen-app.example.com",
      "description": "Premium cinematic movie and series browser.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://screen-app.example.com/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Ezoic Header Script -->
    <!-- REPLACE 'YOUR_EZOIC_ID' WITH YOUR ACTUAL EZOIC PUBLISHER ID -->
    <!-- 
    <script async src="//www.ezoic.com/ezoic.js?id=YOUR_EZOIC_ID"></script>
    -->
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --accent-gold: #e8c547;
            --accent-red: #e85f47;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --card-bg: #1a1a1a;
            --header-bg: rgba(10, 10, 10, 0.95);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'DM Sans', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        h1,
        h2,
        h3,
        .heading {
            font-family: 'Bebas Neue', cursive;
            letter-spacing: 1px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-gold);
        }

        /* Header */
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            padding: 1rem 5%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(232, 197, 71, 0.1);
        }

        .logo {
            font-family: 'Bebas Neue', cursive;
            font-size: 2.5rem;
            color: var(--accent-gold);
            text-decoration: none;
            letter-spacing: 2px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        h1.logo-wrapper {
            margin: 0;
            padding: 0;
            line-height: 1;
        }

        .search-container {
            flex: 1;
            max-width: 500px;
            margin: 0 2rem;
            position: relative;
        }

        #searchInput {
            width: 100%;
            padding: 0.8rem 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            color: white;
            font-family: inherit;
            transition: var(--transition);
        }

        #searchInput:focus {
            outline: none;
            border-color: var(--accent-gold);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 25px rgba(232, 197, 71, 0.2);
            transform: scale(1.02);
        }

        .filters {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .filter-btn {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Bebas Neue', cursive;
            font-size: 1.1rem;
            letter-spacing: 1px;
            transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .filter-btn.active,
        .filter-btn:hover {
            background: var(--accent-gold);
            color: var(--bg-color);
            border-color: var(--accent-gold);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(232, 197, 71, 0.3);
        }

        .custom-filters {
            margin-top: 1rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            padding: 0 5%;
            margin-bottom: 2rem;
        }

        select {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.6rem 1rem;
            border-radius: 5px;
            font-family: inherit;
            cursor: pointer;
            min-width: 150px;
            transition: var(--transition);
        }

        select:focus {
            outline: none;
            border-color: var(--accent-gold);
        }

        /* Hero */
        .hero {
            height: 80vh;
            position: relative;
            display: flex;
            align-items: center;
            padding: 0 5%;
            overflow: hidden;
            background: var(--bg-color);
        }

        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.4;
            transform: scale(1.1);
            transition: transform 1s ease-out;
            z-index: 1;
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, var(--bg-color) 0%, rgba(10, 10, 10, 0.8) 40%, transparent 100%),
                linear-gradient(0deg, var(--bg-color) 0%, transparent 50%);
            z-index: 2;
        }

        .hero-content {
            position: relative;
            z-index: 3;
            max-width: 700px;
            transform: translateY(30px);
            opacity: 0;
            animation: heroUp 1s forwards cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes heroUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .hero-title {
            font-size: clamp(3rem, 8vw, 6rem);
            line-height: 0.9;
            margin-bottom: 1rem;
            color: var(--accent-gold);
        }

        .hero-meta {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--text-muted);
            font-weight: 500;
            flex-wrap: wrap;
        }

        .hero-meta span {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .hero-rating {
            color: var(--accent-gold);
            font-weight: bold;
        }

        .hero-plot {
            font-size: 1.1rem;
            margin-bottom: 2rem;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .btn-primary {
            background: var(--accent-gold);
            color: var(--bg-color);
            border: none;
            padding: 1rem 2.5rem;
            font-family: 'Bebas Neue', cursive;
            font-size: 1.4rem;
            cursor: pointer;
            transition: var(--transition);
            border-radius: 4px;
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
        }

        .btn-primary:hover {
            background: #ffffff;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(232, 197, 71, 0.3);
        }

        /* Grid */
        main {
            padding: 4rem 5%;
        }

        .section-title {
            margin-bottom: 1.5rem;
            font-size: 2.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .section-title::after {
            content: '';
            height: 2px;
            flex: 1;
            background: linear-gradient(90deg, var(--accent-gold), transparent);
            opacity: 0.3;
        }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 2.5rem 1.5rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: var(--transition);
            opacity: 0;
            transform: translateY(20px);
        }

        .card.in-view {
            animation: cardIn 0.6s forwards;
        }

        @keyframes cardIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 15px rgba(232, 197, 71, 0.2);
            border: 1px solid rgba(232, 197, 71, 0.4);
        }

        .card-img-container {
            aspect-ratio: 2/3;
            overflow: hidden;
            position: relative;
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s ease;
        }

        .card:hover .card-img {
            transform: scale(1.1);
        }

        .card-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--accent-red);
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: bold;
            z-index: 5;
        }

        .type-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.7rem;
            text-transform: uppercase;
            border: 1px solid rgba(232, 197, 71, 0.3);
        }

        .card-content {
            padding: 1rem;
        }

        .card-title {
            font-size: 1.2rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 0.3rem;
        }

        .card-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .card-rating {
            color: var(--accent-gold);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* ---------------------------------------------------------
           PREMIUM POLISH & ANIMATIONS
           --------------------------------------------------------- */

        .card {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.6s cubic-bezier(0.22, 1, 0.36, 1),
                transform 0.6s cubic-bezier(0.22, 1, 0.36, 1),
                box-shadow 0.3s ease,
                border-color 0.3s ease;
        }

        .card.in-view {
            opacity: 1;
            transform: translateY(0);
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02) !important;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(232, 197, 71, 0.2);
            border-color: rgba(232, 197, 71, 0.5);
            z-index: 10;
        }

        .card:hover .card-img {
            transform: scale(1.1);
        }

        .hero-bg {
            transition: transform 0.1s ease-out;
            /* Smooth parallax */
        }

        .btn-primary {
            position: relative;
            overflow: hidden;
            transition: background 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
        }

        .btn-primary:active {
            transform: scale(0.95);
        }

        .btn-primary:hover {
            box-shadow: 0 0 15px rgba(232, 197, 71, 0.4);
        }

        html {
            scroll-behavior: smooth;
        }

        /* Modal Slide Up */
        .modal-content {
            transform: translateY(50px);
            opacity: 0;
            transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.5s ease;
        }

        .modal.active .modal-content {
            transform: translateY(0);
            opacity: 1;
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .modal.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: #111;
            width: 100%;
            max-width: 1000px;
            max-height: 90vh;
            border-radius: 20px;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 0 50px rgba(0, 0, 0, 1);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: var(--transition);
        }

        .modal-close:hover {
            background: var(--accent-red);
        }

        .modal-hero {
            height: 400px;
            position: relative;
        }

        .modal-hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .modal-hero::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(0deg, #111 0%, transparent 100%);
        }

        .modal-body {
            padding: 2rem;
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 2.5rem;
            position: relative;
            margin-top: -100px;
        }

        .modal-poster {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .modal-details h2 {
            font-size: 3.5rem;
            line-height: 1;
            margin-bottom: 0.5rem;
            color: var(--accent-gold);
        }

        .modal-tags {
            display: flex;
            gap: 0.6rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .tag {
            background: rgba(232, 197, 71, 0.1);
            color: var(--accent-gold);
            padding: 0.2rem 0.8rem;
            border-radius: 5px;
            font-size: 0.8rem;
            border: 1px solid rgba(232, 197, 71, 0.2);
        }

        .meta-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
            background: rgba(255, 255, 255, 0.03);
            padding: 1.5rem;
            border-radius: 12px;
        }

        .meta-item label {
            display: block;
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .meta-item span {
            font-weight: bold;
            font-size: 1.1rem;
        }

        .gallery {
            margin-top: 2rem;
            overflow-x: auto;
            display: flex;
            gap: 1rem;
            padding-bottom: 1rem;
        }

        .gallery::-webkit-scrollbar {
            height: 4px;
        }

        .gallery img {
            height: 150px;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
        }

        .gallery img:hover {
            transform: scale(1.05);
        }

        .awards-badge {
            background: linear-gradient(45deg, #1a1a1a, #2a2a2a);
            padding: 1rem;
            border-left: 4px solid var(--accent-gold);
            margin-top: 2rem;
            font-style: italic;
        }

        /* Reviews Section (UGC) */
        .reviews-section {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .reviews-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .review-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .review-author {
            font-weight: bold;
            color: var(--accent-gold);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .review-rating {
            font-size: 0.8rem;
            background: rgba(232, 197, 71, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .review-text {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .add-review-btn {
            background: transparent;
            color: var(--accent-gold);
            border: 1px solid var(--accent-gold);
            padding: 0.6rem 1.2rem;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .add-review-btn:hover {
            background: var(--accent-gold);
            color: var(--bg-color);
        }

        iframe {
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Responsive */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 1rem;
                padding: 1.5rem 5%;
            }

            .search-container {
                margin: 0.5rem 0;
                width: 100%;
            }

            .modal-body {
                grid-template-columns: 1fr;
                margin-top: 0;
                padding: 1.5rem;
            }

            .modal-poster {
                max-width: 250px;
                margin: 0 auto;
            }

            .modal-details h2 {
                font-size: 2.5rem;
            }

            .hero {
                height: 60vh;
                text-align: center;
                justify-content: center;
            }

            .hero-meta {
                justify-content: center;
            }

            .hero-title {
                font-size: 3.5rem;
            }

            .hero-bg {
                opacity: 0.6;
            }
        }

        /* Ezoic Ad Placeholders */
        .ad-placeholder {
            margin: 2rem auto;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            min-height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px dashed rgba(255, 255, 255, 0.1);
            max-width: 1200px;
            overflow: hidden;
        }

        .ad-placeholder::before {
            content: 'Advertisement';
        }

        .review-form {
            background: rgba(255, 255, 255, 0.05);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            display: none;
        }

        .review-form.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .review-form input,
        .review-form textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 0.8rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            font-family: inherit;
        }

        .review-form textarea {
            height: 100px;
            resize: none;
        }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <header>
        <h1 class="logo-wrapper"><a href="#" class="logo">SCREEN</a></h1>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search movies, actors, directors or genres...">
        </div>
        <div class="filters">

                <option value="all">All Actors</option>
            </select>
        </div>

        <h2 class="section-title">Trending Today</h2>

        <!-- Ezoic Mid-Grid Ad Placeholder -->
        <div id="ezoic-pub-ad-placeholder-102" class="ad-placeholder"></div>

        <div class="movie-grid" id="movieGrid"></div>
    </main>

    <!-- Ezoic Bottom Ad Placeholder -->
    <div id="ezoic-pub-ad-placeholder-103" class="ad-placeholder"></div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <button class="modal-close" aria-label="Close modal">&times;</button>
            <div id="modalData"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const movieData = JSON.parse(document.getElementById('movieData').textContent);
            const grid = document.getElementById('movieGrid');
            const hero = document.getElementById('hero');
            const searchInput = document.getElementById('searchInput');
            const filterBtns = document.querySelectorAll('.filter-btn');
            const genreSelect = document.getElementById('genreSelect');
            const actorSelect = document.getElementById('actorSelect');
            const modal = document.getElementById('modal');
            const modalData = document.getElementById('modalData');
            const modalClose = document.querySelector('.modal-close');

            let currentType = 'all';
            let currentGenre = 'all';
            let currentActor = 'all';
            let searchQuery = '';

            // Initialize Custom Filters
            const initFilters = () => {
                const genres = new Set();
                const actors = new Set();

                movieData.forEach(m => {
                    m.Genre.split(', ').forEach(g => genres.add(g));
                    m.Actors.split(', ').forEach(a => actors.add(a));
                });

                Array.from(genres).sort().forEach(g => {
                    const opt = document.createElement('option');
                    opt.value = g;
                    opt.textContent = g;
                    genreSelect.appendChild(opt);
                });

                Array.from(actors).sort().forEach(a => {
                    const opt = document.createElement('option');
                    opt.value = a;
                    opt.textContent = a;
                    actorSelect.appendChild(opt);
                });
            };

            // UGC Logic: Local Reviews
            const getLocalReviews = (title) => {
                const allReviews = JSON.parse(localStorage.getItem('screen_reviews') || '{}');
                return allReviews[title] || [];
            };

            const saveLocalReview = (title, review) => {
                const allReviews = JSON.parse(localStorage.getItem('screen_reviews') || '{}');
                if (!allReviews[title]) allReviews[title] = [];
                allReviews[title].unshift({
                    author: review.author || 'Anonymous',
                    rating: review.rating || '5.0',
                    text: review.text,
                    date: new Date().toLocaleDateString()
                });
                localStorage.setItem('screen_reviews', JSON.stringify(allReviews));
            };

            // Advanced SEO: Dynamic Movie Schema
            const injectMovieSchema = () => {
                const schema = {
                    "@context": "https://schema.org",
                    "@type": "ItemList",
                    "itemListElement": movieData.map((m, i) => ({
                        "@type": "ListItem",
                        "position": i + 1,
                        "item": {
                            "@type": "Movie",
                            "name": m.Title,
                            "url": window.location.href + "#" + encodeURIComponent(m.Title),
                            "image": m.Poster,
                            "datePublished": m.Released,
                            "description": m.Plot,
                            "director": {
                                "@type": "Person",
                                "name": m.Director !== "N/A" ? m.Director : "Various"
                            },
                            "aggregateRating": {
                                "@type": "AggregateRating",
                                "ratingValue": m.imdbRating !== "N/A" ? m.imdbRating : "0",
                                "bestRating": "10",
                                "worstRating": "1",
                                "ratingCount": m.imdbVotes.replace(/,/g, '') || "0"
                            }
                        }
                    }))
                };
                const script = document.createElement('script');
                script.type = 'application/ld+json';
                script.text = JSON.stringify(schema);
                document.head.appendChild(script);
            };

            // Render Hero
            const renderHero = () => {
                const topRated = [...movieData].sort((a, b) => {
                    const rA = parseFloat(a.imdbRating) || 0;
                    const rB = parseFloat(b.imdbRating) || 0;
                    return rB - rA;
                })[0];

                const heroEl = document.createElement('div');
                heroEl.className = 'hero';

                const bg = document.createElement('img');
                bg.className = 'hero-bg';
                bg.src = topRated.Images[0] || 'https://images.unsplash.com/photo-1536440136628-849c177e76a1?auto=format&fit=crop&q=80&w=1500';

                const overlay = document.createElement('div');
                overlay.className = 'hero-overlay';

                const content = document.createElement('div');
                content.className = 'hero-content';

                const badge = document.createElement('div');
                badge.className = 'tag';
                badge.style.marginBottom = '1rem';
                badge.style.display = 'inline-block';
                badge.textContent = 'Featured Title';

                const title = document.createElement('h1');
                title.className = 'hero-title';
                title.textContent = topRated.Title;

                const meta = document.createElement('div');
                meta.className = 'hero-meta';
                meta.innerHTML = `
                    <span class="hero-rating">★ ${topRated.imdbRating}</span>
                    <span>${topRated.Year}</span>
                    <span>${topRated.Runtime}</span>
                    <span>${topRated.Genre}</span>
                `;

                const plot = document.createElement('p');
                plot.className = 'hero-plot';
                plot.textContent = topRated.Plot;

                const btn = document.createElement('button');
                btn.className = 'btn-primary';
                btn.innerHTML = 'View Details';
                btn.onclick = () => openModal(topRated);

                content.appendChild(badge);
                content.appendChild(title);
                content.appendChild(meta);
                content.appendChild(plot);
                content.appendChild(btn);

                heroEl.appendChild(bg);
                heroEl.appendChild(overlay);
                heroEl.appendChild(content);

                hero.innerHTML = '';
                hero.appendChild(heroEl);

                // Premium Parallax Effect
                let lastScrollY = window.scrollY;
                window.addEventListener('scroll', () => {
                    const scrolled = window.scrollY;
                    const diff = scrolled - lastScrollY;
                    bg.style.transform = `scale(1.1) translateY(${scrolled * 0.4}px)`;
                });
            };

            // Intersection Observer for staggered entrance
            const observerOptions = {
                threshold: 0.1,
                rootMargin: '0px 0px -50px 0px'
            };

            const revealObserver = new IntersectionObserver((entries) => {
                entries.forEach((entry, index) => {
                    if (entry.isIntersecting) {
                        // Add a slight delay based on position for a wave effect
                        setTimeout(() => {
                            entry.target.classList.add('in-view');
                        }, 50);
                        revealObserver.unobserve(entry.target);
                    }
                });
            }, observerOptions);

            // Render Grid
            const renderGrid = () => {
                grid.innerHTML = '';

                const filtered = movieData.filter(m => {
                    const matchesType = currentType === 'all' || m.Type === currentType;
                    const matchesGenre = currentGenre === 'all' || m.Genre.includes(currentGenre);
                    const matchesActor = currentActor === 'all' || m.Actors.includes(currentActor);
                    const query = searchQuery.toLowerCase();
                    const matchesSearch = !searchQuery ||
                        m.Title.toLowerCase().includes(query) ||
                        m.Actors.toLowerCase().includes(query) ||
                        m.Director.toLowerCase().includes(query) ||
                        m.Genre.toLowerCase().includes(query);

                    return matchesType && matchesGenre && matchesActor && matchesSearch;
                });

                if (filtered.length === 0) {
                    const noResults = document.createElement('p');
                    noResults.style.gridColumn = '1 / -1';
                    noResults.style.textAlign = 'center';
                    noResults.style.padding = '4rem';
                    noResults.style.color = 'var(--text-muted)';
                    noResults.textContent = 'No titles match your search filters.';
                    grid.appendChild(noResults);
                    return;
                }

                filtered.forEach((m, index) => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => openModal(m);

                    const imgContainer = document.createElement('div');
                    imgContainer.className = 'card-img-container';

                    const img = document.createElement('img');
                    img.className = 'card-img';
                    img.src = m.Poster;
                    img.alt = m.Title;
                    // Fallback for broken links
                    img.onerror = () => { img.src = 'https://via.placeholder.com/300x450/111/e8c547?text=' + encodeURIComponent(m.Title); };

                    if (m.ComingSoon) {
                        const badge = document.createElement('div');
                        badge.className = 'card-badge';
                        badge.textContent = 'SOON';
                        imgContainer.appendChild(badge);
                    }

                    const tBadge = document.createElement('div');
                    tBadge.className = 'type-badge';
                    tBadge.textContent = m.Type;

                    imgContainer.appendChild(img);
                    imgContainer.appendChild(tBadge);

                    const content = document.createElement('div');
                    content.className = 'card-content';

                    const title = document.createElement('h3');
                    title.className = 'card-title';
                    title.textContent = m.Title;

                    const info = document.createElement('div');
                    info.className = 'card-info';
                    info.innerHTML = `
                        <span>${m.Year}</span>
                        <span class="card-rating">★ ${m.imdbRating !== 'N/A' ? m.imdbRating : '--'}</span>
                    `;

                    content.appendChild(title);
                    content.appendChild(info);

                    card.appendChild(imgContainer);
                    card.appendChild(content);

                    grid.appendChild(card);

                    // Observe for staggered reveal
                    revealObserver.observe(card);
                });
            };

            // Open Modal
            const openModal = (movie) => {
                modalData.innerHTML = '';

                const heroSection = document.createElement('div');
                heroSection.className = 'modal-hero';
                const heroImg = document.createElement('img');
                heroImg.src = movie.Images[0] || 'https://images.unsplash.com/photo-1536440136628-849c177e76a1?auto=format&fit=crop&q=80&w=1500';
                heroSection.appendChild(heroImg);

                const body = document.createElement('div');
                body.className = 'modal-body';

                const posterContainer = document.createElement('div');
                const poster = document.createElement('img');
                poster.className = 'modal-poster';
                poster.src = movie.Poster;
                posterContainer.appendChild(poster);

                if (movie.Trailer) {
                    const trailerBtn = document.createElement('button');
                    trailerBtn.className = 'btn-primary';
                    trailerBtn.style.marginTop = '1rem';
                    trailerBtn.style.width = '100%';
                    trailerBtn.innerHTML = '▶ Watch Trailer';
                    trailerBtn.onclick = () => {
                        const trailerContainer = document.createElement('div');
                        trailerContainer.className = 'trailer-section';
                        trailerContainer.style.marginTop = '2rem';
                        trailerContainer.innerHTML = `
                        <div style="position:relative; padding-bottom:56.25%; height:0; overflow:hidden; border-radius:12px; border:1px solid rgba(255,255,255,0.1);">
                            <iframe style="position:absolute; top:0; left:0; width:100%; height:100%;" src="${movie.Trailer}?autoplay=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                        </div>`;

                        // Replace button with trailer or scroll to it
                        trailerBtn.style.display = 'none';
                        details.appendChild(trailerContainer);
                        trailerContainer.scrollIntoView({ behavior: 'smooth' });
                    };
                    posterContainer.appendChild(trailerBtn);
                }

                const details = document.createElement('div');
                details.className = 'modal-details';

                const title = document.createElement('h2');
                title.className = 'heading';
                title.textContent = movie.Title;

                const tags = document.createElement('div');
                tags.className = 'modal-tags';
                movie.Genre.split(', ').forEach(g => {
                    const t = document.createElement('span');
                    t.className = 'tag';
                    t.textContent = g;
                    tags.appendChild(t);
                });

                const plot = document.createElement('p');
                plot.style.fontSize = '1.2rem';
                plot.style.marginBottom = '2rem';
                plot.textContent = movie.Plot;

                const metaGrid = document.createElement('div');
                metaGrid.className = 'meta-grid';

                const metaFields = [
                    { label: 'Director', value: movie.Director },
                    { label: 'Cast', value: movie.Actors },
                    { label: 'Runtime', value: movie.Runtime },
                    { label: 'IMDb Rating', value: movie.imdbRating + (movie.imdbVotes !== 'N/A' ? ' (' + movie.imdbVotes + ')' : '') },
                    { label: 'Metascore', value: movie.Metascore },
                    { label: 'Language', value: movie.Language },
                    { label: 'Country', value: movie.Country }
                ];

                metaFields.forEach(f => {
                    const item = document.createElement('div');
                    item.className = 'meta-item';
                    item.innerHTML = `<label>${f.label}</label><span>${f.value}</span>`;
                    metaGrid.appendChild(item);
                });

                details.appendChild(title);
                details.appendChild(tags);
                details.appendChild(plot);
                details.appendChild(metaGrid);

                if (movie.Awards !== 'N/A') {
                    const awards = document.createElement('div');
                    awards.className = 'awards-badge';
                    awards.textContent = '🏆 ' + movie.Awards;
                    details.appendChild(awards);
                }

                if (movie.Images && movie.Images.length > 0) {
                    const gallery = document.createElement('div');
                    gallery.className = 'gallery';
                    movie.Images.forEach(imgUrl => {
                        const img = document.createElement('img');
                        img.src = imgUrl;
                        img.onclick = () => { heroImg.src = imgUrl; };
                        gallery.appendChild(img);
                    });
                    details.appendChild(gallery);
                }

                // Reviews Section
                const reviewsSection = document.createElement('div');
                reviewsSection.className = 'reviews-section';

                const reviewsHeader = document.createElement('div');
                reviewsHeader.className = 'reviews-header';
                reviewsHeader.innerHTML = `<h3>User Reviews</h3> <button class="add-review-btn">+ Write a Review</button>`;

                const reviewForm = document.createElement('div');
                reviewForm.className = 'review-form';
                reviewForm.innerHTML = `
                    <input type="text" placeholder="Your Name" id="revName">
                    <input type="number" placeholder="Rating (1-10)" id="revRating" min="1" max="10" step="0.1">
                    <textarea placeholder="Write your review here..." id="revText"></textarea>
                    <div class="form-actions">
                        <button class="add-review-btn" style="background:transparent; border-color:rgba(255,255,255,0.2); color:white" id="cancelRev">Cancel</button>
                        <button class="btn-primary" style="padding: 0.5rem 1.5rem; font-size: 1rem;" id="submitRev">Submit Review</button>
                    </div>
                `;

                const reviewsList = document.createElement('div');
                reviewsList.className = 'reviews-list';

                const renderReviews = () => {
                    const local = getLocalReviews(movie.Title);
                    reviewsList.innerHTML = '';

                    // Default Placeholders if no reviews
                    if (local.length === 0) {
                        reviewsList.innerHTML = `
                            <div class="review-card">
                                <div class="review-author"><span>CinemaFan_99</span> <span class="review-rating">★ 9.0</span></div>
                                <p class="review-text">Absolutely stunning visuals and a gripping storyline. This is what modern cinema should feel like.</p>
                            </div>
                        `;
                    }

                    local.forEach(r => {
                        const card = document.createElement('div');
                        card.className = 'review-card';
                        card.innerHTML = `
                            <div class="review-author"><span>${r.author}</span> <span class="review-rating">★ ${r.rating}</span></div>
                            <p class="review-text">${r.text}</p>
                            <small style="color:var(--text-muted); font-size:0.7rem">${r.date}</small>
                        `;
                        reviewsList.appendChild(card);
                    });
                };

                reviewsHeader.querySelector('.add-review-btn').onclick = () => reviewForm.classList.toggle('active');
                reviewForm.querySelector('#cancelRev').onclick = () => reviewForm.classList.remove('active');
                reviewForm.querySelector('#submitRev').onclick = () => {
                    const name = document.getElementById('revName').value;
                    const rating = document.getElementById('revRating').value;
                    const text = document.getElementById('revText').value;

                    if (!text) return alert('Please write a review text.');

                    saveLocalReview(movie.Title, { author: name, rating: rating, text: text });
                    reviewForm.classList.remove('active');
                    renderReviews();
                };

                renderReviews();
                reviewsSection.appendChild(reviewsHeader);
                reviewsSection.appendChild(reviewForm);
                reviewsSection.appendChild(reviewsList);
                details.appendChild(reviewsSection);

                body.appendChild(posterContainer);
                body.appendChild(details);

                modalData.appendChild(heroSection);
                modalData.appendChild(body);

                modal.classList.add('active');
                document.body.style.overflow = 'hidden';
            };

            const closeModal = () => {
                modal.classList.remove('active');
                document.body.style.overflow = '';
                setTimeout(() => { modalData.innerHTML = ''; }, 300);
            };

            // Event Listeners
            searchInput.addEventListener('input', (e) => {
                searchQuery = e.target.value;
                renderGrid();
            });

            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentType = btn.dataset.type;
                    renderGrid();
                });
            });

            genreSelect.addEventListener('change', (e) => {
                currentGenre = e.target.value;
                renderGrid();
            });

            actorSelect.addEventListener('change', (e) => {
                currentActor = e.target.value;
                renderGrid();
            });

            modalClose.onclick = closeModal;
            modal.onclick = (e) => { if (e.target === modal) closeModal(); };
            window.onkeydown = (e) => { if (e.key === 'Escape') closeModal(); };

            // Init
            initFilters();
            injectMovieSchema();
            renderHero();
            renderGrid();
        });
    </script>
</body>

</html>
